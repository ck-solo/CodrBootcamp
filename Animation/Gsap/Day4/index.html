<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stunning Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="loader">
        <div class="loaderCounter">
            <h2>00</h2>
        </div>
    </div>
    <div class="landingPage">
      <nav class="navbar">
        <div class="logo">Wanderlust</div>
        <div class="nav-links">
          <a href="#">Home</a>
          <a href="#">Destinations</a>
          <a href="#">Gallery</a>
          <a href="#">Contact</a>
        </div>
        <div class="menu-btn">Menu</div>
      </nav>

      <div class="imageDiv">
        <img src="https://images.unsplash.com/photo-1621791554700-35b52803f596?q=80&w=1920&auto=format&fit=crop" alt="Nature landscape">
        <div class="overlay"></div>
      </div>
      
      <div class="contentDiv">
        <div class="title">
            <h1>Discover <span class="highlight">Wilderness</span></h1>
        </div>
        <div class="subtitle">
            <h3>Embark on an adventure of a lifetime</h3>
            <h3>and connect with nature like never before.</h3>
        </div>
        <div class="cta">
            <button class="btn">Start Your Journey</button>
        </div>
      </div>
    </div>

     

    <!-- GSAP for animation -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
  </body>
</html>
